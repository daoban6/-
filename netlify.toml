[build]
  command = "npm install"
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/usage-tracking"
  to = "/usage-tracking.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
